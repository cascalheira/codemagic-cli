name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Both macOS jobs run on Apple Silicon; x86-64 is cross-compiled.
          - name: macOS · x86-64 (cross-compiled)
            runner: macos-latest
            target: x86_64-apple-darwin

          - name: macOS · arm64
            runner: macos-latest
            target: aarch64-apple-darwin

          - name: Linux · x86-64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu

          - name: Linux · arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ci-${{ matrix.target }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build (debug)
        run: cargo build --locked --target ${{ matrix.target }}

      - name: Clippy
        run: cargo clippy --locked --target ${{ matrix.target }} -- -D warnings
