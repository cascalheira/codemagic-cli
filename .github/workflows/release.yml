name: Release

# Runs when a version tag is pushed (e.g. v1.2.0) or triggered manually.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

    # Allow the workflow to create GitHub Releases and upload assets.
permissions:
  contents: write

jobs:
  # ── Build each platform / architecture ────────────────────────────────────
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false # let all builds finish even if one fails
      matrix:
        include:
          # ── macOS ───────────────────────────────────────────────────────────
          # Both macOS jobs run on Apple Silicon runners.
          # Rust + Apple's toolchain cross-compile x86-64 natively — no extra setup.
          - name: macOS · x86-64 (cross-compiled)
            runner: macos-latest
            target: x86_64-apple-darwin
            artifact: codemagic-cli-macos-x86_64

          - name: macOS · arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            artifact: codemagic-cli-macos-aarch64

          # ── Linux ────────────────────────────────────────────────────────────
          - name: Linux · x86-64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: codemagic-cli-linux-x86_64

          - name: Linux · arm64
            runner: ubuntu-24.04-arm # native ARM64 GitHub-hosted runner
            target: aarch64-unknown-linux-gnu
            artifact: codemagic-cli-linux-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Caches ~/.cargo/registry and the target/ directory between runs,
      # keyed by target triple so each matrix leg has its own cache.
      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # reqwest links against the system OpenSSL on Linux (native-tls feature).
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      # Reduces binary size — safe for distribution builds.
      # Must happen BEFORE signing — stripping after signing invalidates the signature.
      - name: Strip debug symbols
        run: strip target/${{ matrix.target }}/release/codemagic-cli

      # ── macOS code signing ────────────────────────────────────────────────
      # Import the Developer ID Application certificate into a short-lived
      # keychain so codesign can find it without touching the login keychain.
      - name: Import signing certificate
        if: runner.os == 'macOS'
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PWD }}
        run: |
          # Decode the base64 certificate to a temp .p12 file
          echo "$CERTIFICATE_BASE64" | base64 --decode > /tmp/certificate.p12

          # Create a dedicated build keychain and make it the default
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          # Keep the keychain unlocked for up to 1 hour (enough for the job)
          security set-keychain-settings -t 3600 -u build.keychain

          # Import the certificate and allow codesign to access it
          security import /tmp/certificate.p12 \
            -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # Clean up the decoded .p12 immediately
          rm /tmp/certificate.p12

      # Sign with the Hardened Runtime flag — required for notarization.
      - name: Sign binary
        if: runner.os == 'macOS'
        env:
          SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          codesign \
            --force \
            --options runtime \
            --sign "$SIGNING_IDENTITY" \
            --timestamp \
            target/${{ matrix.target }}/release/codemagic-cli

          # Verify the signature looks correct before continuing
          codesign --verify --deep --strict --verbose=2 \
            target/${{ matrix.target }}/release/codemagic-cli

      # Notarize the signed binary with Apple.
      # notarytool requires a zip/dmg/pkg — wrap the binary, submit, then discard the zip.
      - name: Notarize binary
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Wrap into a zip for submission (notarytool does not accept bare binaries)
          ditto -c -k --keepParent \
            target/${{ matrix.target }}/release/codemagic-cli \
            /tmp/codemagic-cli-notarize.zip

          # Submit and wait for Apple to finish (usually < 2 min)
          xcrun notarytool submit /tmp/codemagic-cli-notarize.zip \
            --apple-id      "$APPLE_ID" \
            --password      "$APPLE_APP_PASSWORD" \
            --team-id       "$APPLE_TEAM_ID" \
            --wait

          rm /tmp/codemagic-cli-notarize.zip

      # Always remove the temporary keychain, even if a previous step failed.
      - name: Clean up keychain
        if: runner.os == 'macOS' && always()
        run: security delete-keychain build.keychain || true

      # Pack the binary into a .tar.gz and generate a SHA-256 checksum.
      - name: Package
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/codemagic-cli codemagic-cli
          tar -czf "${{ matrix.artifact }}.tar.gz" codemagic-cli

          # sha256sum command differs between macOS and GNU/Linux
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            shasum -a 256 "${{ matrix.artifact }}.tar.gz" \
              > "${{ matrix.artifact }}.tar.gz.sha256"
          else
            sha256sum "${{ matrix.artifact }}.tar.gz" \
              > "${{ matrix.artifact }}.tar.gz.sha256"
          fi

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256
          if-no-files-found: error

  # ── Publish a GitHub Release (tag pushes only) ────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all build artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true # flatten into dist/ rather than per-artifact dirs

      - name: List release assets
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Auto-generate release notes from merged PRs / commit messages.
          generate_release_notes: true
          files: dist/*
