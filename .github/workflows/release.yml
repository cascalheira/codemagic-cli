name: Release

# Runs when a version tag is pushed (e.g. v1.2.0) or triggered manually.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

    # Allow the workflow to create GitHub Releases and upload assets.
permissions:
  contents: write

jobs:
  # ── Build each platform / architecture ────────────────────────────────────
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false # let all builds finish even if one fails
      matrix:
        include:
          # ── macOS ───────────────────────────────────────────────────────────
          - name: macOS · Intel (x86-64)
            runner: macos-13 # last GitHub-hosted Intel Mac runner
            target: x86_64-apple-darwin
            artifact: codemagic-cli-macos-x86_64

          - name: macOS · Apple Silicon (arm64)
            runner: macos-latest # macOS 14 on M-series hardware
            target: aarch64-apple-darwin
            artifact: codemagic-cli-macos-aarch64

          # ── Linux ────────────────────────────────────────────────────────────
          - name: Linux · x86-64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: codemagic-cli-linux-x86_64

          - name: Linux · arm64
            runner: ubuntu-24.04-arm # native ARM64 GitHub-hosted runner
            target: aarch64-unknown-linux-gnu
            artifact: codemagic-cli-linux-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Caches ~/.cargo/registry and the target/ directory between runs,
      # keyed by target triple so each matrix leg has its own cache.
      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # reqwest links against the system OpenSSL on Linux (native-tls feature).
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      # Reduces binary size — safe for distribution builds.
      - name: Strip debug symbols
        run: strip target/${{ matrix.target }}/release/codemagic-cli

      # Pack the binary into a .tar.gz and generate a SHA-256 checksum.
      - name: Package
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/codemagic-cli codemagic-cli
          tar -czf "${{ matrix.artifact }}.tar.gz" codemagic-cli

          # sha256sum command differs between macOS and GNU/Linux
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            shasum -a 256 "${{ matrix.artifact }}.tar.gz" \
              > "${{ matrix.artifact }}.tar.gz.sha256"
          else
            sha256sum "${{ matrix.artifact }}.tar.gz" \
              > "${{ matrix.artifact }}.tar.gz.sha256"
          fi

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256
          if-no-files-found: error

  # ── Publish a GitHub Release (tag pushes only) ────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all build artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true # flatten into dist/ rather than per-artifact dirs

      - name: List release assets
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Auto-generate release notes from merged PRs / commit messages.
          generate_release_notes: true
          files: dist/*
